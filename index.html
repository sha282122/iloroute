<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Document</title>
    <link  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-info-subtle">

    <div class="container mt-5">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white text-center">
                <h2>ILOILO TRAVEL ROUTE</h2>
            </div>

            <div class="card-body text-center">
                <select id="route">
                    <option value="Iloilo City - Oton">Iloilo City - Oton</option>
                    <option value="Iloilo City - Pavia">Iloilo City - Pavia</option>
                    <option value="Iloilo City - Jaro">Iloilo City - Jaro</option>
                </select>

                <button onclick="saveRoute()" class="btn btn-success">Save Route</button>
                <button onclick="displayRoute()" class="btn btn-warning">Show Saved Routes</button>
            </div>
        </div>

        <div class="row mt-4" id="output">
        </div>
    </div>

    <script src="app.js"></script>

    <script>
        if('serviceWorker' in navigator){
            navigator.serviceWorker.register('service-worker.js');
        }

        function saveRoute(){
            let route = document.getElementById("route").value;

            let routes = JSON.parse(localStorage.getItem("iloiloRoutes")) || [];
            routes.push(route);   // corrected line

            localStorage.setItem("iloiloRoutes", JSON.stringify(routes));
            alert("route saved succesfuly!");
        }

        function displayRoute(){
            let routes = JSON.parse(localStorage.getItem("iloiloRoutes")) || [];

            let output = document.getElementById("output");
            output.innerHTML = "";

            routes.forEach(function(route){
                output.innerHTML += `
                <div class="col-md-4 mb-3">
                    <div class="card text-bg-primary shadow">
                        <div class="card-body">
                            <h5 class="card-title">Saved Route</h5>
                            <p class="card-text">${route}</p>
                        </div>
                    </div>
                </div>
                `;
            });
        }
    </script>
    
</body>
</html>
